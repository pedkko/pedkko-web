<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Librería de cifrado AES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <title>Para ti 💌</title>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="login">
    <div class="login-box">
        <div class="lock-icon">🔒</div>
        <h2>Acceso privado</h2>
        <p class="login-subtitle">Solo para ti, mi amor</p>
        <input type="password" id="password" placeholder="Ingresa tu PIN" onkeydown="if(event.key==='Enter') checkPassword()">
        <button onclick="checkPassword()">Entrar</button>
        <p id="error"></p>
    </div>
</div>

<!-- PANTALLA DE SELECCIÓN -->
<div id="seleccion" style="display:none;">
    <div class="seleccion-header">
        <h1 class="titulo-seleccion">Para ti, Michelin ❤️</h1>
        <p class="subtitulo-seleccion">Elige qué quieres leer hoy</p>
    </div>
    <div class="tarjetas-contenedor">
        <div class="tarjeta" onclick="mostrarSeccion('noviazgo')">
            <div class="tarjeta-icono">💌</div>
            <div class="tarjeta-cinta">Especial</div>
            <h3>Carta de<br>Noviazgo</h3>
            <p>La pregunta que nació del corazón</p>
            <div class="tarjeta-btn">Leer carta →</div>
        </div>
        <div class="tarjeta tarjeta-mes" onclick="mostrarSeccion('mes')">
            <div class="tarjeta-icono">🌙</div>
            <div class="tarjeta-cinta tarjeta-cinta-mes">3 meses</div>
            <h3>Nuestro<br>3er Mes</h3>
            <p>Un momento que quiero celebrar contigo</p>
            <div class="tarjeta-btn">Leer carta →</div>
        </div>
    </div>
</div>

<!-- SECCIÓN: CARTA DE NOVIAZGO -->
<div id="noviazgo" style="display:none;">
    <button class="btn-volver" onclick="volverSeleccion()">← Volver</button>
    <h1>Te amo mucho ❤️</h1>
    <div class="contenedor">
        <div class="envoltura-sobre">
            <div class="sobre">
                <div class="carta">
                    <div class="contenido" id="contenido-noviazgo">
                        <!-- El contenido se inyecta dinámicamente después del descifrado -->
                    </div>
                </div>
            </div>
            <div class="corazon"></div>
            <div class="solapa-derecha"></div>
            <div class="solapa-izquierda"></div>
        </div>
    </div>
</div>

<!-- SECCIÓN: 3ER MES -->
<div id="mes" style="display:none;">
    <button class="btn-volver" onclick="volverSeleccion()">← Volver</button>
    <h1>3 meses contigo 🌙</h1>
    <div class="contenedor">
        <div class="envoltura-sobre envoltura-mes">
            <div class="sobre">
                <div class="carta">
                    <div class="contenido" id="contenido-mes">
                        <!-- El contenido se inyecta dinámicamente después del descifrado -->
                    </div>
                </div>
            </div>
            <div class="corazon corazon-mes"></div>
            <div class="solapa-derecha solapa-mes"></div>
            <div class="solapa-izquierda solapa-mes"></div>
        </div>
    </div>
</div>

const KEY_LABELS = {
  ArrowDown:'↓', ArrowUp:'↑', ArrowLeft:'←', ArrowRight:'→',
  Space:'ESPACIO', Escape:'ESC', Enter:'ENTER', ShiftLeft:'SHIFT', ControlLeft:'CTRL'
};
function keyLabel(code) {
  if (KEY_LABELS[code]) return KEY_LABELS[code];
  if (code.startsWith('Key'))   return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  return code;
}

let rebindingAction = null; // si no es null, el próximo keydown se captura como nuevo bind

const CONTROL_ACTIONS = [
  { id:'fastfall', label:'Caída rápida / Voltereta' },
  { id:'skate',    label:'Patineta (Hover)' },
  { id:'rewind',   label:'Rebobinar (Ult. Ekko)' },
  { id:'mute',     label:'Silenciar música' },
];

// ─── PANTALLA COMPLETA (propia, basada en CSS — no usa la Fullscreen API) ────
// Así evitamos por completo los problemas de compatibilidad entre navegadores
// y el hecho de que el navegador "se come" la tecla Escape antes que nuestro JS.
let pseudoFullscreen = false;
function isCurrentlyFullscreen() { return pseudoFullscreen; }
function fsButtonLabel() {
  return pseudoFullscreen ? 'PANTALLA ESTÁNDAR' : 'PANTALLA COMPLETA';
}
function toggleFullscreen() {
  pseudoFullscreen = !pseudoFullscreen;
  document.body.classList.toggle('fs-mode', pseudoFullscreen);
  if (pseudoFullscreen) {
    // Renderizar a mayor resolución para que no se vea pixelado al estirarse
    const dpr = window.devicePixelRatio || 1;
    applyRenderScale(Math.min(3, Math.max(2, dpr * 1.5)));
  } else {
    applyRenderScale(1); // volver a la resolución normal (mejor rendimiento)
  }
  const fsBtn = document.getElementById('fsBtn');
  if (fsBtn) fsBtn.textContent = fsButtonLabel();
}

// ─── MENÚS DE PAUSA (HTML overlay) ───────────────────────────────────────────
function showPauseMenu() {
  overlay.innerHTML = `
    <h2>PAUSA</h2>
    <p style="margin-bottom:18px">El juego está en pausa</p>
    <button class="btn" id="resumeBtn">REANUDAR</button>
    <button class="btn" id="controlsBtn" style="margin-top:12px">CONTROLES</button>
    <button class="btn" id="fsBtn" style="margin-top:12px">${fsButtonLabel()}</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('resumeBtn').onclick   = resumeFromPause;
  document.getElementById('controlsBtn').onclick = showControlsMenu;
  document.getElementById('fsBtn').onclick       = toggleFullscreen;
}

function resumeFromPause() {
  overlay.style.display = 'none';
  state = 'playing';
  rebindingAction = null;
  if (musicGain && !musicMuted) musicGain.gain.value = 0.2;
}

function showControlsMenu() {
  const rows = CONTROL_ACTIONS.map(a => `
    <div style="display:flex;justify-content:space-between;align-items:center;width:280px;margin:7px auto;">
      <span style="font-size:11px;color:#ffffffcc;font-family:'Share Tech Mono',monospace;text-align:left;flex:1">${a.label}</span>
      <button class="btn" style="padding:5px 16px;font-size:11px;margin:0" id="rebind_${a.id}">${keyLabel(KEYBINDS[a.id])}</button>
    </div>
  `).join('');
  overlay.innerHTML = `
    <h2 style="font-size:22px">CONTROLES</h2>
    <p style="margin-bottom:14px;font-size:10px">Click en una tecla para reasignarla</p>
    <div>${rows}</div>
    <button class="btn" id="backBtn" style="margin-top:16px">VOLVER</button>
  `;
  CONTROL_ACTIONS.forEach(a => {
    document.getElementById('rebind_'+a.id).onclick = () => startRebind(a.id);
  });
  document.getElementById('backBtn').onclick = showPauseMenu;
}

function startRebind(actionId) {
  rebindingAction = actionId;
  const btn = document.getElementById('rebind_'+actionId);
  if (btn) { btn.textContent = '...'; btn.style.borderColor = '#f59e0b'; btn.style.color = '#f59e0b'; }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop() {
  frameId = requestAnimationFrame(loop);
  ctx.clearRect(0, 0, W, H);

  // ── Pausa ────────────────────────────────────────────────────────────────
  if (state === 'paused') {
    drawBackground(0); drawPlatforms(0);
    updateParticles(); drawParticles();
    drawDrones(); drawGases(); drawCoins(); drawEkko();
    drawPauseOverlay();
    return;
  }

  // ── Screen shake: aplicar translate global ────────────────────────────────
  updateShake();
  ctx.save();
  ctx.translate(shakeX, shakeY);

  const speed = state === 'playing' ? gameSpeed : 0;

  drawBackground(state === 'playing' ? gameSpeed : 2);
  drawPlatforms(speed);
  updateParticles();
  drawParticles();

  if (state === 'playing') {
    if (!isRewinding) {
      updateEkko(gameSpeed);
      tickSkate();
      tickDrones(gameSpeed, score);
      if (reviveGraceTimer > 0) reviveGraceTimer--;
      tickGases(gameSpeed, score);
      tickPulses(gameSpeed, score);
      let hitObstacle = false;
      if (reviveGraceTimer <= 0) {
        hitObstacle = checkDroneHit() || checkGasHit() || checkPulseHit();
      }
      if (hitObstacle) {
        triggerGameOver(); // sin "return": deja que el frame termine y restaure el canvas
      } else {
        checkNearMiss();
        tickCoins(gameSpeed);
        tickCoinBankAutoRefill();
      }
    }
  }
  if (state === 'playing') {
    checkZoneChange(score);

    // Capturar snapshot para retroceso (cada 3 frames, máx 3s de historia)
    if (scoreTimer % 3 === 0) {
      rewindBuffer.push(captureSnapshot());
      if (rewindBuffer.length > 60) rewindBuffer.shift();
    }
    // Score
    scoreTimer++;
    tickMilestone();
    if (scoreTimer % 6 === 0) {
      score += 1;
      checkMilestone(score);
      scoreDisplay.textContent = Math.floor(score);
      if (score > hiScore) {
        hiScore = score;
        hiDisplay.textContent = Math.floor(hiScore);
        localStorage.setItem('ciberekko_hi', Math.floor(hiScore));
      }
    }

    // Speed ramp
    if (scoreTimer % 300 === 0 && gameSpeed < 12) {
      gameSpeed += 0.4;
    }
    // Speed bar (0 at 4, full at 12)
    speedFill.style.width = (((gameSpeed - 4) / 8) * 100).toFixed(1) + '%';
  }

  // Ventana de retroceso: contar tiempo y permitir R
  if (state === 'dying') {
    dyingTimer++;
    if (dyingTimer >= DYING_DURATION) {
      state = 'dead';
      if (score > hiScore) hiScore = score;
      hiDisplay.textContent = Math.floor(hiScore);
      setTimeout(showDead, 300);
    }
  }

  drawDrones();
  drawGases();
  drawPulses();
  drawCoins();
  drawEkko();
  drawZoneBanner();
  drawZoneFlash();
  drawSkateUI();
  drawRewindUI();
  drawMusicUI();
  drawCoinUI();
  drawMilestone();
  drawRewindFx();
  if (state === 'dying') drawDyingOverlay();

  // Líneas de velocidad cuando el juego va muy rápido (refuerza sensación de velocidad)
  if (state === 'playing' && gameSpeed > 7) {
    const intensity = Math.min(1, (gameSpeed - 7) / 5);
    ctx.save();
    ctx.strokeStyle = 'rgba(180,220,255,1)';
    ctx.lineWidth = 1;
    const seed = Math.floor(Date.now()/55);
    for (let i = 0; i < Math.floor(5 + intensity*7); i++) {
      const ry = (Math.sin(seed*0.7+i*13.1)*0.5+0.5) * H;
      const len = 30 + Math.sin(seed*0.3+i*7.7)*0.5*40 + intensity*40;
      const rx  = (Math.sin(seed*1.3+i*5.3)*0.5+0.5) * W;
      ctx.globalAlpha = 0.05 + intensity*0.10;
      ctx.beginPath();
      ctx.moveTo(rx, ry);
      ctx.lineTo(rx - len, ry);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Scanline overlay
  ctx.save();
  ctx.globalAlpha = 0.03;
  for (let sy = 0; sy < H; sy += 3) {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, sy, W, 1);
  }
  ctx.restore(); // scanlines
  ctx.restore(); // shake translate
}


// ─── MÚSICA DE FONDO (synthwave / Zaun) ──────────────────────────────────────
let musicGain = null, musicMuted = false, musicStarted = false;
let triggerMusicRestart = null; // se asigna dentro de startMusic() la primera vez

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  const ac = getAudio();
  musicGain = ac.createGain();
  musicGain.gain.value = 0.2;
  musicGain.connect(ac.destination);

  // Rastreo de nodos activos para poder cortarlos de inmediato al reiniciar
  let activeNodes = [];
  const track = (node, gain) => {
    const h = { node, gain };
    activeNodes.push(h);
    node.onended = () => { const i = activeNodes.indexOf(h); if (i >= 0) activeNodes.splice(i, 1); };
  };

  // ── Identidad musical por zona ───────────────────────────────────────────
  const ZONE_MUSIC = [
    { // 0: Zaun Noche — synthwave oscuro, calmado
      bpm: 100,
      bass:  [55,55,65.4,82.4, 55,55,73.4,82.4],
      chord: [110,130.8,164.8,220],
      pent:  [220,261.6,293.7,329.6,392.0],
      arps:  [[0,1,2,3,4,3,2,1],[0,2,4,2,0,2,4,2],[0,1,2,1,3,2,4,3]],
      leadWave:'square', padWave:'triangle', bassWave:'sawtooth',
      hatVols:[0.09,0.04,0.08,0.04,0.09,0.04,0.08,0.04],
      kickBeats:[0,2], sweep:false, padVol:0.040, bassVol:0.20
    },
    { // 1: Zaun Tóxico — más rápido, inquietante, bajo "acid"
      bpm: 116,
      bass:  [49,49,58.3,49, 49,55,61.7,49],
      chord: [98,116.5,146.8,196],
      pent:  [196,219.5,261.6,293.7,349.2],
      arps:  [[0,1,2,3,4,3,2,1],[0,1,0,2,0,3,0,4],[4,2,0,2,4,2,0,2]],
      leadWave:'sawtooth', padWave:'sine', bassWave:'sawtooth',
      hatVols:[0.10,0.10,0.05,0.10,0.10,0.10,0.05,0.10],
      kickBeats:[0,1.5,2,3.5], sweep:true, padVol:0.034, bassVol:0.20
    },
    { // 2: Las Profundidades — intenso, oscuro, four-on-the-floor
      bpm: 128,
      bass:  [41.2,41.2,49,55, 41.2,41.2,46.2,55],
      chord: [82.4,98,123.5,164.8],
      pent:  [164.8,195.998,220,246.9,293.7],
      arps:  [[0,1,2,3,4,3,2,1],[4,3,2,1,0,1,2,3],[0,2,3,4,3,2,1,0]],
      leadWave:'sawtooth', padWave:'triangle', bassWave:'square',
      hatVols:[0.11,0.11,0.11,0.11,0.11,0.11,0.11,0.11],
      kickBeats:[0,1,2,3], sweep:true, padVol:0.032, bassVol:0.22
    },
    { // 3: El Núcleo — el más rápido e intenso, industrial/hextech
      bpm: 138,
      bass:  [55,55,58.3,49, 55,61.7,58.3,49],
      chord: [110,130.5,164.8,196],
      pent:  [220,246.9,277.2,329.6,392.0],
      arps:  [[0,1,2,3,4,3,2,1],[0,2,1,3,2,4,3,1],[4,4,3,3,2,2,1,1]],
      leadWave:'sawtooth', padWave:'sawtooth', bassWave:'square',
      hatVols:[0.12,0.07,0.12,0.12,0.07,0.12,0.12,0.07],
      kickBeats:[0,0.75,1.5,2,2.75,3.5], sweep:true, padVol:0.030, bassVol:0.24
    },
  ];

  // ── Generadores de sonido ────────────────────────────────────────────────
  const note = (freq, type, t, dur, vol, dt = 0) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq; o.detune.value = dt;
    o.connect(g); g.connect(musicGain);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.015);
    g.gain.setValueAtTime(vol, t + dur * 0.82);
    g.gain.linearRampToValueAtTime(0, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
    track(o, g);
  };

  // Bajo con sweep de filtro (efecto "acid") para zonas tensas
  const bassNote = (freq, type, t, dur, vol, sweep) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g);
    if (sweep) {
      const flt = ac.createBiquadFilter();
      flt.type = 'lowpass'; flt.Q.value = 9;
      flt.frequency.setValueAtTime(280, t);
      flt.frequency.exponentialRampToValueAtTime(1500, t + dur*0.4);
      flt.frequency.exponentialRampToValueAtTime(260, t + dur*0.95);
      g.connect(flt); flt.connect(musicGain);
    } else {
      g.connect(musicGain);
    }
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.015);
    g.gain.setValueAtTime(vol, t + dur * 0.8);
    g.gain.linearRampToValueAtTime(0, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
    track(o, g);
  };

  const kick = (t, big=false) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(musicGain);
    o.frequency.setValueAtTime(big?105:90, t);
    o.frequency.exponentialRampToValueAtTime(24, t + 0.2);
    g.gain.setValueAtTime(big?0.58:0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
    o.start(t); o.stop(t + 0.38);
    track(o, g);
  };

  const hat = (t, vol = 0.07) => {
    const buf = ac.createBuffer(1, ac.sampleRate * 0.04, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf;
    const flt = ac.createBiquadFilter();
    flt.type = 'highpass'; flt.frequency.value = 7000;
    const g = ac.createGain();
    src.connect(flt); flt.connect(g); g.connect(musicGain);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.045);
    src.start(t); src.stop(t + 0.05);
    track(src, g);
  };

  let bar = 0;

  function sched(t) {
    // Lee la zona ACTUAL al inicio de cada compás → cambia de tema solo
    const z   = (typeof curZone === 'number') ? curZone : 0;
    const cfg = ZONE_MUSIC[Math.min(z, ZONE_MUSIC.length-1)];
    const B   = 60 / cfg.bpm;
    const bi  = bar % cfg.bass.length;
    const isFill = (bar % 8 === 7); // compás de variación cada 8 compases

    // Kick según patrón de la zona
    cfg.kickBeats.forEach((beatPos, i) => kick(t + beatPos*B, i===0));

    // Hi-hats con volumen propio de la zona
    for (let i = 0; i < 8; i++) hat(t + i*B*0.5, cfg.hatVols[i]);

    // Bajo (2 notas por compás, con sweep si la zona lo pide)
    bassNote(cfg.bass[bi],                 cfg.bassWave, t,       B*1.85, cfg.bassVol, cfg.sweep);
    bassNote(cfg.bass[(bi+1)%cfg.bass.length], cfg.bassWave, t+B*2, B*1.85, cfg.bassVol, cfg.sweep);

    // Pad sostenido (se omite cada 4° compás para dar "aire")
    if (bar % 4 !== 3) {
      cfg.chord.forEach(f => {
        note(f, cfg.padWave, t, B*4, cfg.padVol);
        note(f, cfg.padWave, t, B*4, cfg.padVol*0.5, 9);
      });
    }

    // Arpegio: rota entre patrones de la zona, o hace un fill ascendente
    if (isFill) {
      const run = [0,1,2,3,4,3,2,1,0]; // run rápido de 9 notas
      run.forEach((pi,i) => note(cfg.pent[pi], cfg.leadWave, t + i*B*(4/9), B*0.32, 0.036));
    } else {
      const pattern = cfg.arps[bar % cfg.arps.length];
      pattern.forEach((pi, i) => note(cfg.pent[pi], cfg.leadWave, t + i*B*0.5, B*0.36, 0.032));
    }

    bar++;
    const nextT = t + B * 4;
    schedTimeoutId = setTimeout(() => sched(nextT), Math.max(0, (nextT - ac.currentTime - 0.18) * 1000));
  }

  let schedTimeoutId = null;
  sched(ac.currentTime + 0.08);

  // ── Reinicio inmediato de música (llamado desde startGame al reiniciar) ───
  // Corta de golpe TODO lo que esté sonando (aunque ya estuviera "agendado"
  // con tiempos fijos en el contexto de audio) y arranca un compás nuevo
  // leyendo la zona ya reseteada, en vez de esperar a que termine el compás viejo.
  triggerMusicRestart = function() {
    clearTimeout(schedTimeoutId);
    const now = ac.currentTime;
    activeNodes.forEach(h => {
      try {
        h.gain.gain.cancelScheduledValues(now);
        h.gain.gain.setValueAtTime(h.gain.gain.value, now);
        h.gain.gain.linearRampToValueAtTime(0, now + 0.04);
        h.node.stop(now + 0.05);
      } catch(e) {}
    });
    activeNodes = [];
    bar = 0;
    sched(now + 0.06);
  };
}

function toggleMusic() {
  musicMuted = !musicMuted;
  if (musicGain) {
    musicGain.gain.cancelScheduledValues(0);
    musicGain.gain.value = musicMuted ? 0 : 0.2;
  }
}

function drawMusicUI() {
  const cx = W - 118, cy = H - 30;
  ctx.save();
  ctx.globalAlpha = 0.7;
  ctx.font = '15px serif'; ctx.textAlign = 'center';
  ctx.fillText(musicMuted ? '🔇' : '🔊', cx, cy + 5);
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 7px Orbitron,monospace';
  ctx.fillText('[M]', cx, cy + 21);
  ctx.restore(); // end shake translate
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  // ── Captura de reasignación de tecla (tiene prioridad sobre todo) ─────────
  if (rebindingAction) {
    e.preventDefault();
    if (e.code !== 'Escape') {
      KEYBINDS[rebindingAction] = e.code;
      try { localStorage.setItem('ciberekko_keybinds', JSON.stringify(KEYBINDS)); } catch(err){}
    }
    rebindingAction = null;
    showControlsMenu(); // refrescar con el nuevo valor
    return;
  }

  if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') && state === 'playing') {
    e.preventDefault();
    wHeld = true;
    if (!skateActive) doJump(); // salto normal solo fuera del hover
  }
  if ((e.code === KEYBINDS.fastfall || e.code === KEYBINDS.skate) && state === 'playing') {
    e.preventDefault();
    if (e.code === KEYBINDS.skate && !skateActive) {
      activateSkate(); // tecla de patineta la activa si no está activa
    } else {
      downHeld = true; // desciende en hover ó caída rápida en suelo
      // Voltereta: tecla de caída en el suelo (sin patineta activa) inicia un giro
      if (e.code === KEYBINDS.fastfall && !skateActive && ekko.onGround && !ekko.rolling) {
        ekko.rolling = true;
        ekko.rollTimer = 0;
        sfxJump(); // sonido corto tipo "swoosh"
        spawnParticles(ekko.x+ekko.w/2, ekko.y+ekko.h, COLORS.neonA, 8);
      }
    }
  }
  if (e.code === 'Escape') {
    if (state === 'playing') {
      state = 'paused';
      if (musicGain) musicGain.gain.value = 0; // silenciar en pausa
      showPauseMenu();
    } else if (state === 'paused') {
      resumeFromPause();
    }
  }
  if (e.code === KEYBINDS.mute) { toggleMusic(); }
  if (e.code === KEYBINDS.rewind && (state === 'playing' || state === 'dying')) {
    e.preventDefault();
    activateRewind();
  }
  if ((e.code === 'Space' || e.code === 'Enter') && state === 'menu') {
    startGame();
  }
});

document.addEventListener('keyup', e => {
  if (e.code === KEYBINDS.fastfall || e.code === KEYBINDS.skate) downHeld = false;
  if (['Space','ArrowUp','KeyW'].includes(e.code))               wHeld    = false;
});

canvas.addEventListener('pointerdown', () => {
  if (state === 'playing') {
    if (skateActive) { wHeld = true; } else doJump();
  }
});
canvas.addEventListener('pointerup', () => { wHeld = false; });

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Mostrar récord guardado al inicio
hiDisplay.textContent = Math.floor(hiScore);
resetPlatforms();
resetEkko();
loop();
showMenu();
</script>
